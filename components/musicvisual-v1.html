<!-- Component: baiviet-music-notes-sync -->
<div class="art-v3-music-visualizer" style="max-width: 740px; margin: 40px auto; background: #0f172a; padding: 25px; border-radius: 12px; font-family: sans-serif; color: #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.3);">
  
  <!-- 1. TIÊU ĐỀ & TRÌNH PHÁT YOUTUBE ẨN (Để lấy sự kiện thời gian) -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 15px;">
    <div>
      <h4 style="margin: 0; color: #38bdf8; font-size: 16px;">🎵 Trải Nghiệm Âm Nhạc Trực Quan</h4>
      <p style="margin: 5px 0 0 0; font-size: 12px; color: #94a3b8;">Nốt nhạc sẽ tự động nhảy theo giai điệu bài hát</p>
      
    </div>
    <!-- Cụm nút điều khiển -->
    <button id="btn-play-stream" onclick="controlMusic()" style="background: #0ea5e9; color: #fff; border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.2s;">Bật Nhạc & Xem Nốt 🔊</button>
  </div>

  <!-- Nhúng YouTube Iframe Player API để tương tác sâu (Lấy số giây chính xác) -->
  <div id="yt-hidden-player" style="display: none;"></div>

  <!-- 2. KHÔNG GIAN HIỂN THỊ NỐT NHẠC (VISUALIZER ZONE) -->
  <div style="background: #1e293b; padding: 20px; border-radius: 8px; text-align: center; min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; overflow: hidden;">
    
    <!-- Dòng hiển thị nốt nhạc hiện tại (Phóng to nghệ thuật) -->
    <div id="current-note-display" style="font-size: 48px; font-weight: bold; color: #10b981; text-shadow: 0 0 20px rgba(16,185,129,0.6); transition: all 0.1s ease; transform: scale(1);">
      --
    </div>
    
    <!-- Chuỗi nốt nhạc đang chạy (Dạng dòng chảy thời gian) -->
    <div id="note-flow-line" style="margin-top: 15px; font-size: 14px; color: #64748b; letter-spacing: 4px; font-weight: bold;">
      Đang chờ bài nhạc bắt đầu...
    </div>
  </div>

  <!-- 3. KỊCH BẢN ĐỒNG BỘ JS (BỘ NÃO ĐIỀU KHIỂN) -->
  <script>
    // Tải thư viện YouTube API ngầm
    let tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    let firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    let player;
    let isPlaying = false;
    let updateTimer;

    // DỮ LIỆU ĐỒNG BỘ: Giây thứ mấy -> Hiện nốt gì (Anh Tín có thể cho người dùng tự cấu hình mảng này trong Editor nhé)
    // Ví dụ bài hát: Kìa con bướm vàng (Đồ Rê Mi Đồ - Đồ Rê Mi Đồ)
    const BAN_NHAC_DATA = [
      { second: 1, note: "ĐỒ", text: "[ĐỒ] Rê Mi Đồ..." },
      { second: 2, note: "RÊ", text: "Đồ [RÊ] Mi Đồ..." },
      { second: 3, note: "MI", text: "Đồ Rê [MI] Đồ..." },
      { second: 4, note: "ĐỒ", text: "Đồ Rê Mi [ĐỒ]..." },
      { second: 5, note: "ĐỒ", text: "[ĐỒ] Rê Mi Đồ vế sau..." },
      { second: 6, note: "RÊ", text: "Đồ [RÊ] Mi Đồ vế sau..." },
      { second: 7, note: "MI", text: "Đồ Rê [MI] Đồ vế sau..." },
      { second: 8, note: "ĐỒ", text: "Đồ Rê Mi [ĐỒ] vế sau..." },
      { second: 9, note: "MI", text: "[MI] Pha Sol..." },
      { second: 10, note: "PHA", text: "Mi [PHA] Sol..." },
      { second: 11, note: "SOL", text: "Mi Pha [SOL]..." },
      { second: 13, note: "MI", text: "[MI] Pha Sol vế sau..." },
      { second: 14, note: "PHA", text: "Mi [PHA] Sol vế sau..." },
      { second: 15, note: "SOL", text: "Mi Pha [SOL] vế sau..." },
      { second: 16, note: "ĐỐ", text: "Bay lên cao chạm nốt [ĐỐ]!" }
    ];

    function onYouTubeIframeAPIReady() {
      player = new YT.Player('yt-hidden-player', {
        height: '0',
        width: '0',
        videoId: 'jfKfPfyJRdk', // Thay bằng ID Video YouTube Music thật của anh
        playerVars: { 'autoplay': 0, 'controls': 0, 'mute': 0 },
        events: { 'onStateChange': onPlayerStateChange }
      });
    }

    function controlMusic() {
      if(!player) return;
      if (!isPlaying) {
        player.playVideo();
        document.getElementById('btn-play-stream').innerText = "Tạm Dừng ⏸️";
        document.getElementById('btn-play-stream').style.background = "#ef4444";
        isPlaying = true;
      } else {
        player.pauseVideo();
        document.getElementById('btn-play-stream').innerText = "Tiếp Tục Phát 🔊";
        document.getElementById('btn-play-stream').style.background = "#0ea5e9";
        isPlaying = false;
      }
    }

    function onPlayerStateChange(event) {
      if (event.data == YT.PlayerState.PLAYING) {
        // Cứ mỗi 100ms quét vị trí kim giây của bài hát để cập nhật nốt nhạc ngay lập tức
        updateTimer = setInterval(checkAndVisualiseNotes, 100);
      } else {
        clearInterval(updateTimer);
      }
    }

    function checkAndVisualiseNotes() {
      if (!player) return;
      // Lấy thời gian thực tại của bài hát (làm tròn thành số nguyên giây)
      const currentSecond = Math.floor(player.getCurrentTime());
      
      // Tìm nốt nhạc tương ứng với giây hiện tại
      const matchNote = BAN_NHAC_DATA.find(item => item.second === currentSecond);
      
      if (matchNote) {
        const displayDiv = document.getElementById('current-note-display');
        const flowDiv = document.getElementById('note-flow-line');
        
        // Nếu nốt nhạc mới xuất hiện, tạo hiệu ứng giật nhẹ (animation pop) cho bắt mắt
        if (displayDiv.innerText !== matchNote.note) {
          displayDiv.innerText = matchNote.note;
          flowDiv.innerText = matchNote.text;
          
          // Đổi màu ngẫu nhiên cho nốt để tạo cảm giác lung linh tạp chí nghệ thuật
          const colors = ['#10b981', '#38bdf8', '#f59e0b', '#ec4899', '#a855f7'];
          displayDiv.style.color = colors[currentSecond % colors.length];
          
          // Hiệu ứng phóng nhẹ nốt nhạc lên rồi thu về
          displayDiv.style.transform = "scale(1.2)";
          setTimeout(() => { displayDiv.style.transform = "scale(1)"; }, 150);
        }
      }
    }
  </script>
</div>
