<!-- Component: baiviet-flipbook-comic -->
<div class="art-v1-flipbook" style="max-width: 900px; margin: 40px auto; font-family: sans-serif; text-align: center;">
  
  <!-- Nhúng thư viện PageFlip siêu nhẹ từ CDN (Đặt trong head lúc export) -->
  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>

  <!-- Khung chứa cuốn sách truyện tranh -->
  <div style="display: inline-block; background: #1e293b; padding: 20px; border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);">
    <div id="comic-book" style="width: 800px; height: 500px; margin: 0 auto;">
      
      <!-- Trang bìa (Trang 1) -->
      <div class="page" style="background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=400') center/cover;" data-density="hard">
        <div style="background: rgba(0,0,0,0.5); width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:#fff;">
          <h2 style="font-size: 28px; padding: 20px; border: 2px solid #fff;">TRUYỆN TRANH AI<br><span style="font-size:16px;">Tập 1: Khởi Đầu</span></h2>
        </div>
      </div>
      
      <!-- Trang 2 (Nội dung bên trái) -->
      <div class="page" style="background: #fff; padding: 10px; border-right: 1px solid #e2e8f0;">
        <img src="https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?q=80&w=380" style="width:100%; height:100%; object-fit:cover; border-radius:4px;" alt="AI Comic Page 1">
      </div>
      
      <!-- Trang 3 (Nội dung bên phải) -->
      <div class="page" style="background: #fff; padding: 10px;">
        <img src="https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=380" style="width:100%; height:100%; object-fit:cover; border-radius:4px;" alt="AI Comic Page 2">
      </div>
      
      <!-- Trang 4 (Lời kết) -->
      <div class="page" style="background: #f8fafc; padding: 40px; display:flex; flex-direction:column; justify-content:center; align-items:center;" data-density="hard">
        <h3 style="color:#0f172a;">Hết Tập 1</h3>
        <p style="font-size:14px; color:#64748b; text-align:center;">Truyện tranh ngắn được tạo ra bởi trí tuệ nhân tạo và đóng gói bởi OpenEduVN Ecosystem.</p>
      </div>

    </div>
  </div>
  
  <p style="font-size:13px; color:#64748b; margin-top:12px; font-style:italic;">📖 Di chuột vào mép trang hoặc vuốt để lật xem trang tiếp theo</p>

  <script>
    // Kích hoạt hiệu ứng lật sách sau khi trang load xong
    window.addEventListener('DOMContentLoaded', () => {
      const pageFlip = new St.PageFlip(document.getElementById('comic-book'), {
        width: 400, // Chiều rộng 1 trang
        height: 500, // Chiều cao 1 trang
        size: "fixed",
        minWidth: 300,
        minHeight: 400,
        maxWidth: 500,
        maxHeight: 600,
        drawShadow: true,
        showCover: true,
        usePortrait: false // Luôn hiển thị trang đôi khi màn hình rộng
      });
      pageFlip.loadFromHTML(document.querySelectorAll('#comic-book .page'));
    });
  </script>
</div>
