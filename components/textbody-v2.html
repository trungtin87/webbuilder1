  <h2 style="font-size:24px; margin-top:35px; margin-bottom:15px; color:#0f172a; font-weight:700; border-left:4px solid #007bff; padding-left:12px;">Xử lý cú pháp ANTLR4 trong VietJS</h2>
  <p style="margin-bottom:20px;">Để trình biên dịch có thể hiểu được các từ khóa tiếng Việt như <code>hàm</code>, <code>biến</code>, <code>nếu</code>, hệ thống parser cần được tối ưu hóa toàn diện. Bộ phân tích cú pháp tạo ra một cây thực thi tĩnh (AST) trước khi chuyển đổi trực tiếp sang mã LLVM hoặc JavaScript gốc.</p>
