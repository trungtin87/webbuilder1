<!-- 1. PHAN HTML: Cau truc cua component[cite: 1] -->
<nav class="thanhdieuhuong">
  <div class="thanhdieuhuong-container">

    <!-- Nut bam Menu cho Mobile[cite: 1] -->
    <button class="thanhdieuhuong-nutbam" aria-label="Toggle Menu" onclick="thongbaoThanhDieuHuong()">

    <ul class="thanhdieuhuong-menu">

<!-- 2. PHAN STYLE: Giao dien va Responsive (Duoc co lap bang class cha)[cite: 1] -->
<style>
  /* Dung chung class cha .thanhdieuhuong de khong bi anh huong sang cac section khac */
  .thanhdieuhuong {
    width: 100%;
    background-color: #ffffff;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    position: relative;
    font-family: sans-serif;
  }

  .thanhdieuhuong-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .thanhdieuhuong-logo {
    font-size: 24px;
    font-weight: bold;
    text-decoration: none;
    color: #ff0000;
  }

  .thanhdieuhuong-menu {
    display: flex;
    list-style: none;
    gap: 20px;
    margin: 0;
    padding: 0;
    color: #1fb34b;
  
  }

  .thanhdieuhuong-menu a {
    text-decoration: none;
    font-size: 18 px;
    font-weight: 550;
    color: #333333;
  }

  .thanhdieuhuong-nutbam {
    display: none; /* An tren Desktop[cite: 1] */
    flex-direction: column;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
  }

  .thanhdieuhuong-nutbam span {
    display: block;
    width: 25px;
    height: 3px;
    background-color: #000000;
    border-radius: 2px;
  }

  /* RESPONSIVE: Tu dong co gian tren Mobile & Tablet (< 768px)[cite: 1] */
  @media (max-width: 768px) {
    .thanhdieuhuong-nutbam {
      display: flex; /* Hien thi nut bam[cite: 1] */
    }

    .thanhdieuhuong-menu {
      display: none; /* Mac dinh an menu di[cite: 1] */
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      background-color: #ffffff;
      flex-direction: column;
      padding: 20px;
      box-shadow: 0 4px 5px rgba(0,0,0,0.1);
      gap: 15px;
    }

    /* Lop kich hoat de hien thi Menu khi bam nut[cite: 1] */
    .thanhdieuhuong-menu.hien-thi {
      display: flex;
    }
  }
</style>


<!-- 3. PHAN SCRIPT: Xu ly logic tuong tac[cite: 1] -->
<script>
  // Dat ten ham gan lien voi ten component de tranh trung lap voi component khac
  function thongbaoThanhDieuHuong() {
    const menu = document.querySelector('.thanhdieuhuong-menu');
    if (menu) {
      menu.classList.toggle('hien-thi');
    }
  }
</script>
